<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Action Dice - Persistent</title>
    <style>
        :root {
            --bg: #020617;
            --card: #0f172a;
            --accent: #6366f1;
            --danger: #ef4444;
            --text: #f1f5f9;
            --text-muted: #64748b;
            --input-bg: #1e293b;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card);
            border: 1px solid #1e293b;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Dice Area */
        .dice-stage {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            position: relative;
        }

        .edit-toggle {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none; border: none;
            color: var(--text-muted);
            cursor: pointer; font-size: 1.2rem;
        }

        .dice-box {
            width: 140px; height: 140px;
            background: #1e293b; border-radius: 24px;
            border: 3px solid var(--accent);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
        }

        .dice-box.rolling { animation: shuffle-shake 0.15s infinite; border-color: #f43f5e; }
        .dice-icon { font-size: 4rem; }
        .dice-label { font-size: 0.85rem; font-weight: 800; margin-top: 10px; color: var(--accent); text-transform: uppercase; }

        /* Editor Panel */
        #editor-panel {
            padding: 20px; background: #111827;
            border-bottom: 1px solid #1e293b; display: none;
        }

        .setting-group { margin-bottom: 15px; border-bottom: 1px solid #1e293b; padding-bottom: 10px; }
        .setting-label { font-size: 0.7rem; color: var(--accent); font-weight: bold; margin-bottom: 8px; display: block; }

        .editor-row { display: flex; gap: 10px; margin-bottom: 8px; }
        .editor-row input, .tz-input {
            background: var(--input-bg); border: 1px solid #334155;
            color: white; padding: 8px; border-radius: 8px; outline: none;
        }
        .input-icon { width: 45px; text-align: center; }
        .input-label { flex-grow: 1; }
        .tz-input { width: 100%; box-sizing: border-box; }

        /* Buttons */
        .btn-container { padding: 20px 30px 30px; }
        .roll-btn {
            width: 100%; padding: 18px;
            background: var(--accent); color: white;
            border: none; border-radius: 16px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer;
        }
        .clear-btn {
            width: 100%; padding: 8px; margin-top: 10px;
            background: transparent; color: var(--danger);
            border: 1px solid var(--danger); border-radius: 8px;
            cursor: pointer; font-size: 0.7rem; font-weight: bold;
        }

        /* History */
        .history-wrap {
            background: #020617; padding: 24px;
            border-top: 1px solid #1e293b; flex-grow: 1;
        }

        .history-header { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; display: flex; justify-content: space-between; margin-bottom: 15px;}
        #history-list { max-height: 250px; overflow-y: auto; scrollbar-width: thin; }

        .log-item {
            background: #1e293b; padding: 12px 15px;
            border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .log-time-block { text-align: right; }
        .log-date { font-size: 0.65rem; color: var(--text-muted); display: block; }
        .log-time { font-family: monospace; font-size: 0.75rem; color: #a5b4fc; }

        @keyframes shuffle-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="dice-stage">
            <button class="edit-toggle" onclick="toggleEditor()">⚙️</button>
            <div id="dice-box" class="dice-box">
                <span id="current-icon" class="dice-icon">🎲</span>
                <span id="current-label" class="dice-label">READY</span>
            </div>
        </div>

        <div id="editor-panel">
            <div class="setting-group">
                <span class="setting-label">TIMEZONE SETTINGS</span>
                <input type="number" id="tz-offset" class="tz-input" step="0.5" onchange="updateTZ(this.value)">
                <div id="tz-preview" style="font-size: 0.6rem; color: #a5b4fc; margin-top: 5px;"></div>
            </div>

            <div class="setting-group">
                <span class="setting-label">EDIT DICE FACES</span>
                <div id="editor-inputs"></div>
            </div>

            <button class="clear-btn" onclick="clearHistory()">WIPE RUN HISTORY</button>
            <button onclick="toggleEditor()" style="width:100%; padding:10px; margin-top:10px; background:#334155; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">SAVE & CLOSE</button>
        </div>

        <div class="btn-container">
            <button id="roll-btn" class="roll-btn" onclick="roll()">ROLL THE DICE</button>
        </div>

        <div class="history-wrap">
            <div class="history-header">
                <span>Recent Rolls</span>
                <span id="counter">Total: 0</span>
            </div>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        const defaultActivities = [
            { icon: '▶️', label: 'YT' }, { icon: '🍳', label: 'MF' }, { icon: '🧩', label: 'SD' },
            { icon: '🔬', label: 'DD' }, { icon: '🏆', label: 'COMPETITION' }, { icon: '🎯', label: 'T2A' }
        ];

        function getStoredArray(key, fallback) {
            try {
                const rawValue = localStorage.getItem(key);
                if (rawValue === null || rawValue === '') return fallback;
                const parsedValue = JSON.parse(rawValue);
                return Array.isArray(parsedValue) ? parsedValue : fallback;
            } catch (error) {
                console.warn(`Unable to load ${key} from storage`, error);
                return fallback;
            }
        }

        function normalizeActivities(input) {
            if (!Array.isArray(input) || input.length === 0) {
                return defaultActivities.map(activity => ({ ...activity }));
            }

            const validActivities = input.filter(activity => activity && typeof activity === 'object' && typeof activity.icon === 'string' && typeof activity.label === 'string');
            return validActivities.length > 0 ? validActivities : defaultActivities.map(activity => ({ ...activity }));
        }

        function normalizeHistory(input) {
            if (!Array.isArray(input)) return [];
            return input.filter(item => item && typeof item === 'object' && typeof item.icon === 'string' && typeof item.label === 'string' && typeof item.date === 'string' && typeof item.time === 'string');
        }

        function getFaceName(face) {
            return (face?.label || face?.icon || '').toString().trim();
        }

        function getRandomIndex(max) {
            if (typeof window !== 'undefined' && window.crypto && typeof window.crypto.getRandomValues === 'function') {
                const cryptoArray = new Uint32Array(1);
                window.crypto.getRandomValues(cryptoArray);
                return cryptoArray[0] % max;
            }
            return Math.floor(Math.random() * max);
        }

        function pickNextActivity() {
            if (!Array.isArray(activities) || activities.length === 0) {
                return defaultActivities[0];
            }

            const previousResult = history[0];
            const previousName = previousResult ? getFaceName(previousResult) : '';

            if (previousName) {
                const availableActivities = activities.filter(activity => getFaceName(activity) !== previousName);
                if (availableActivities.length > 0) {
                    return availableActivities[getRandomIndex(availableActivities.length)];
                }
            }

            return activities[getRandomIndex(activities.length)];
        }

        let activities = normalizeActivities(getStoredArray('diceActivities', defaultActivities));
        let tzOffset = -(new Date().getTimezoneOffset() / 60);
        let history = normalizeHistory(getStoredArray('diceHistory', []));
        const storedTZ = parseFloat(localStorage.getItem('diceTZ'));
        if (Number.isFinite(storedTZ)) tzOffset = storedTZ;

        const iconDisplay = document.getElementById('current-icon');
        const labelDisplay = document.getElementById('current-label');
        const editorPanel = document.getElementById('editor-panel');
        const historyList = document.getElementById('history-list');
        const btn = document.getElementById('roll-btn');
        const box = document.getElementById('dice-box');

        function buildEditor() {
            const container = document.getElementById('editor-inputs');
            container.innerHTML = '';
            activities.forEach((act, i) => {
                const row = document.createElement('div');
                row.className = 'editor-row';
                row.innerHTML = `
                    <input type="text" class="input-icon" value="${act.icon}" onchange="updateActivity(${i}, 'icon', this.value)">
                    <input type="text" class="input-label" value="${act.label}" onchange="updateActivity(${i}, 'label', this.value)">
                `;
                container.appendChild(row);
            });
            document.getElementById('tz-offset').value = tzOffset;
            updateTZPreview();
        }

        function updateActivity(i, field, val) {
            activities[i][field] = val;
            localStorage.setItem('diceActivities', JSON.stringify(activities));
        }

        function updateTZ(val) {
            tzOffset = parseFloat(val);
            localStorage.setItem('diceTZ', tzOffset);
            updateTZPreview();
        }

        function updateTZPreview() {
            const now = getOffsetDate();
            document.getElementById('tz-preview').textContent = `Preview: ${now.date} ${now.time}`;
        }

        function toggleEditor() {
            buildEditor();
            editorPanel.style.display = (editorPanel.style.display === 'block') ? 'none' : 'block';
        }

        function getOffsetDate() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const offsetTime = new Date(utc + (3600000 * tzOffset));
            const y = offsetTime.getFullYear();
            const m = String(offsetTime.getMonth() + 1).padStart(2, '0');
            const d = String(offsetTime.getDate()).padStart(2, '0');
            const time = offsetTime.toLocaleTimeString('en-GB', { hour12: false }) + '.' + 
                         offsetTime.getMilliseconds().toString().padStart(3, '0');
            return { date: `${y}-${m}-${d}`, time: time };
        }

        function roll() {
            btn.disabled = true;
            box.classList.add('rolling');
            
            const shuffleTimer = setInterval(() => {
                const temp = pickNextActivity();
                iconDisplay.textContent = temp?.icon || '🎲';
                labelDisplay.textContent = "ROLLING...";
            }, 60);

            setTimeout(() => {
                clearInterval(shuffleTimer);
                const result = pickNextActivity();

                if (!result) {
                    box.classList.remove('rolling');
                    btn.disabled = false;
                    return;
                }

                iconDisplay.textContent = result.icon;
                labelDisplay.textContent = result.label;
                box.classList.remove('rolling');
                btn.disabled = false;

                const ts = getOffsetDate();
                
                // SAVE TO HISTORY ARRAY
                const rollData = { icon: result.icon, label: result.label, date: ts.date, time: ts.time };
                history = [rollData, ...normalizeHistory(history)].slice(0, 100);
                localStorage.setItem('diceHistory', JSON.stringify(history));
                renderHistory();
                
                if ("vibrate" in navigator) navigator.vibrate(60);
            }, 800);
        }

        function renderHistory() {
            history = normalizeHistory(history);
            historyList.innerHTML = '';
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'log-item';
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:1.4rem">${item.icon}</span>
                        <span style="font-weight:600">${item.label}</span>
                    </div>
                    <div class="log-time-block">
                        <span class="log-date">${item.date}</span>
                        <span class="log-time">${item.time}</span>
                    </div>
                `;
                historyList.appendChild(div);
            });
            document.getElementById('counter').textContent = `Total: ${history.length}`;
        }

        function clearHistory() {
            if (confirm("Are you sure you want to delete all saved rolls?")) {
                history = [];
                localStorage.removeItem('diceHistory');
                renderHistory();
            }
        }

        // Initial setup
        buildEditor();
        renderHistory();
    </script>
</body>
</html>
